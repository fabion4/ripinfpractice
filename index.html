function buildMock(){let qs=[];Object.keys(MOCK_WEIGHTS).forEach(t=>{qs=qs.concat(shuffle(BANK.filter(q=>q.t===t)).slice(0,MOCK_WEIGHTS[t]))});
 qs=qs.concat(shuffle(BANK.filter(q=>q.t==='logica')).slice(0,8));qs=shuffle(qs).concat(shuffle(SITU).slice(0,7));return qs}
function rMock(v){
 if(!mockState){v.innerHTML=`<h2>Simulazione d'esame</h2><p class="sub">Replica fedele della prova RIPAM: 40 quesiti in 60 minuti — 25 di materia, 8 di logica, 7 situazionali in coda.</p>
 <div class="card"><div class="chips"><span class="chip plus">Esatta +0,75</span><span class="chip minus">Errata −0,25</span><span class="chip zero">Omessa 0</span></div>
 <p class="note">Puoi lasciare quesiti in bianco (nessuna penalità) e navigare liberamente. I situazionali non hanno mai penalità: rispondi sempre. Allo scadere del tempo la prova si chiude da sola. Soglia: <b>21/30</b>.</p>
 <div class="btnrow"><button class="btn" onclick="startMock()">Avvia simulazione (60:00)</button></div></div>
 ${S.mocks.length?`<div class="card"><span class="eyebrow">Storico simulazioni</span>${S.mocks.map((m,i)=>`<div class="stat"><span>Mock ${i+1} · ${m.date}</span><b class="${m.score>=21?'pass':'fail'}">${m.score.toFixed(2).replace('.',',')}/30 ${m.score>=21?'· IDONEO':'· sotto soglia'}</b></div>`).join('')}</div>`:''}`;return}
 if(mockState.finished){return rMockResult(v)}
 const q=mockState.qs[mockState.i], a=mockState.answers[mockState.i];
 let h=`<div class="mockbar"><span style="font-size:.8rem;font-weight:700">Quesito ${mockState.i+1}/40 · ${q.s?'SITUAZIONALE':TOPICS[q.t].toUpperCase()}</span><span class="timer ${mockState.left<300?'low':''}" id="tmr">${fmtT(mockState.left)}</span></div>
 <div class="card qbox"><p class="qtext">${esc(q.q)}</p>`;
 q.o.forEach((o,i)=>{h+=`<button class="opt ${a===i?'sel':''}" onclick="pick(${i})">${String.fromCharCode(65+i)}. ${esc(o)}</button>`});
 h+=`<div class="btnrow"><button class="btn sec sm" ${mockState.i===0?'disabled':''} onclick="mv(-1)">← Precedente</button>
 <button class="btn sec sm" onclick="pick(null)">Lascia in bianco</button>
 <button class="btn sm" ${mockState.i===39?'disabled':''} onclick="mv(1)">Successivo →</button>
 <button class="btn warn sm" onclick="if(confirm('Consegnare la prova?'))endMock()">Consegna</button></div>
 <div class="qnav">${mockState.qs.map((_,i)=>`<button class="qn ${mockState.answers[i]!=null?'answered':''} ${i===mockState.i?'cur':''}" onclick="mockState.i=${i};render()">${i+1}</button>`).join('')}</div></div>`;
 v.innerHTML=h}
function fmtT(s){return String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0')}
function startMock(){mockState={qs:buildMock(),answers:Array(40).fill(null),i:0,left:3600,running:true,finished:false};
 mockState.tick=setInterval(()=>{mockState.left--;const t=document.getElementById('tmr');if(t){t.textContent=fmtT(mockState.left);if(mockState.left<300)t.classList.add('low')}if(mockState.left<=0)endMock()},1000);render()}
function pick(i){mockState.answers[mockState.i]=i;if(mockState.i<39)mockState.i++;render()}
function mv(d){mockState.i=Math.max(0,Math.min(39,mockState.i+d));render()}
function endMock(){clearInterval(mockState.tick);mockState.running=false;mockState.finished=true;
 let score=0,brk={};
 mockState.qs.forEach((q,i)=>{const a=mockState.answers[i],t=q.s?'situazionale':q.t;brk[t]=brk[t]||{ok:0,ko:0,om:0};
  if(q.s){if(a!=null){score+=q.s[a];if(q.s[a]===0.75)brk[t].ok++;else brk[t].ko++;rec(q.id,q.s[a]===0.75,'situazionale')}else brk[t].om++}
  else{if(a==null)brk[t].om++;else if(a===q.c){score+=0.75;brk[t].ok++;rec(q.id,true,q.t)}else{score-=0.25;brk[t].ko++;rec(q.id,false,q.t)}}});
 mockState.score=Math.max(0,Math.round(score*100)/100);mockState.brk=brk;
 S.mocks.push({date:new Date().toLocaleDateString('it-IT'),score:mockState.score});save();paintHeader();render()}
function rMockResult(v){const m=mockState,pass=m.score>=21;
 let h=`<h2>Risultato simulazione</h2><div class="card" style="text-align:center"><span class="eyebrow">Punteggio</span>
 <p class="result-big ${pass?'pass':'fail'}">${m.score.toFixed(2).replace('.',',')}<small> / 30 · soglia 21</small></p>
 <p class="verdict ${pass?'ok':'ko'}">${pass?'IDONEO — sopra la soglia':'Sotto soglia — analizza gli errori qui sotto'}</p></div>
 <div class="card"><span class="eyebrow">Dettaglio per materia</span><table class="brk"><tr><th>Materia</th><th>✓</th><th>✗</th><th>Omesse</th></tr>`;
 Object.keys(m.brk).forEach(t=>{const b=m.brk[t];h+=`<tr><td>${TOPICS[t]}</td><td style="color:var(--ok);font-weight:700">${b.ok}</td><td style="color:var(--err);font-weight:700">${b.ko}</td><td>${b.om}</td></tr>`});
 h+=`</table><p class="note">Gli errori sono già nel registro Errori: fai subito il re-test (è il passaggio che produce più guadagno).</p></div>
 <div class="card"><span class="eyebrow">Revisione quesiti</span>`;
 m.qs.forEach((q,i)=>{const a=m.answers[i];const okIdx=q.s?q.s.indexOf(0.75):q.c;const ok=q.s?(a!=null&&q.s[a]===0.75):a===q.c;
  h+=`<hr class="sep"><p style="font-weight:600">${i+1}. ${esc(q.q)}</p><p class="note">Tua risposta: <b>${a==null?'omessa':String.fromCharCode(65+a)+'. '+esc(q.o[a])}</b> ${a==null?'':(ok?'<span style="color:var(--ok);font-weight:900">✓</span>':'<span style="color:var(--err);font-weight:900">✗</span>')}<br>Risposta ${q.s?'più efficace':'esatta'}: <b>${String.fromCharCode(65+okIdx)}. ${esc(q.o[okIdx])}</b><br>${esc(q.e)}</p>`});
 h+=`</div><div class="btnrow"><button class="btn" onclick="mockState=null;go('errori')">Vai al re-test errori →</button><button class="btn sec" onclick="mockState=null;render()">Chiudi</button></div>`;
 v.innerHTML=h}

// ============ FLASHCARD (Leitner 5 livelli) ============
const INTERVALS=[0,1,2,4,7];
function dueCards(){const now=Date.now();return CARDS.filter(c=>{const s=S.srs[c.id];return !s||s.due<=now})}
function rFlash(v){
 if(!flashState){const due=dueCards();
  v.innerHTML=`<h2>Flashcard · ripetizione spaziata</h2><p class="sub">Sistema Leitner a 5 livelli: le carte che sbagli tornano subito, quelle che sai si distanziano (0 → 1 → 2 → 4 → 7 giorni). Studiale ogni giorno.</p>
  <div class="card" style="text-align:center"><span class="eyebrow">In scadenza ora</span><p class="result-big">${due.length}<small> / ${CARDS.length} carte</small></p>
  <div class="btnrow" style="justify-content:center">${due.length?`<button class="btn" onclick="startFlash()">Inizia ripasso</button>`:'<p class="note">Tutte le carte sono programmate: torna più tardi o rivedi un quiz.</p>'}</div></div>`;return}
 const c=flashState.list[flashState.i];
 v.innerHTML=`<h2>Flashcard</h2><p class="fmeta">Carta ${flashState.i+1} di ${flashState.list.length} · ${TOPICS[c.t]}</p>
 <div class="fcard" role="button" tabindex="0" onclick="flipCard()" onkeydown="if(event.key===' '||event.key==='Enter')flipCard()">
 <span class="side">${flashState.back?'RISPOSTA':'DOMANDA — tocca per girare'}</span>
 <p class="txt">${flashState.back?esc(c.b):esc(c.f).replace(/\{…\}/g,'<span class="gap">&nbsp;…&nbsp;</span>')}</p></div>
 ${flashState.back?`<div class="srsrow"><button class="btn again" onclick="grade(0)">Di nuovo</button><button class="btn hard" onclick="grade(1)">Difficile</button><button class="btn good" onclick="grade(2)">La so</button></div>`:`<div class="btnrow" style="justify-content:center"><button class="btn" onclick="flipCard()">Mostra risposta</button></div>`}
 <p class="note" style="text-align:center;margin-top:14px"><span class="kbd">Di nuovo</span> = torna al livello 1 · <span class="kbd">La so</span> = sale di livello e si allontana nel tempo</p>`}
function startFlash(){flashState={list:shuffle(dueCards()),i:0,back:false};render()}
function flipCard(){flashState.back=!flashState.back;render()}
function grade(g){const c=flashState.list[flashState.i];let s=S.srs[c.id]||{box:0};
 if(g===0)s.box=0;else if(g===1)s.box=Math.max(0,s.box);else s.box=Math.min(4,(s.box||0)+1);
 s.due=Date.now()+(g===0?0:INTERVALS[s.box]*864e5)+(g===0?60000:0);S.srs[c.id]=s;save();
 if(flashState.i+1<flashState.list.length){flashState.i++;flashState.back=false;render()}
 else{document.getElementById('view').innerHTML=`<h2>Flashcard</h2><div class="card" style="text-align:center"><span class="eyebrow">Sessione completata</span><p class="result-big">✓</p><p class="note">Le carte segnate "Di nuovo" ricompariranno subito; le altre secondo l'intervallo del loro livello.</p><div class="btnrow" style="justify-content:center"><button class="btn" onclick="flashState=null;render()">Torna alle flashcard</button></div></div>`;flashState=null}}

// ============ ERRORI ============
function rErr(v){const ids=Object.keys(S.errors);
 if(quizState&&quizState.topic==='__err'){return rQuiz(v)}
 if(!ids.length){v.innerHTML=`<h2>Registro errori</h2><div class="empty">Nessun errore in sospeso. Ogni quesito sbagliato nei quiz o nelle simulazioni finisce qui e ne esce solo dopo <b>2 risposte corrette consecutive</b>.</div>`;return}
 const byT={};ids.forEach(id=>{const t=S.errors[id].t;byT[t]=(byT[t]||0)+1});
 v.innerHTML=`<h2>Registro errori</h2><p class="sub">Il re-test degli errori è l'attività a più alto rendimento: ripetili finché non escono dal registro (2 corrette di fila).</p>
 <div class="card"><span class="eyebrow">Errori in sospeso: ${ids.length}</span>${Object.keys(byT).map(t=>`<div class="stat"><span>${TOPICS[t]}</span><b>${byT[t]}</b></div>`).join('')}
 <div class="btnrow"><button class="btn" onclick="startErrQuiz()">Avvia quiz errori (${ids.length})</button></div></div>`}
function startErrQuiz(){const ids=Object.keys(S.errors);const list=shuffle([...BANK,...SITU].filter(q=>ids.includes(q.id)));
 quizState={topic:'__err',list,i:0,ok:0,ans:null};TOPICS.__err='Quiz errori';cur='quiz';paintTabs();render()}

// ============ STATISTICHE ============
function rStats(){const byT={};Object.keys(S.hist).forEach(id=>{const h=S.hist[id];byT[h.t]=byT[h.t]||{a:0,c:0};byT[h.t].a+=h.a;byT[h.t].c+=h.c});
 const keys=Object.keys(byT);
 let h=`<h2>Statistiche</h2><p class="sub">Percentuale di risposte corrette per materia (tutte le sessioni). Concentra lo studio dove la barra è rossa o gialla.</p>`;
 if(!keys.length)return h+`<div class="empty">Ancora nessun dato: inizia con la simulazione diagnostica del Giorno 1.</div>`;
 h+=`<div class="card">`;
 keys.sort((a,b)=>(byT[a].c/byT[a].a)-(byT[b].c/byT[b].a)).forEach(t=>{const p=Math.round(byT[t].c/byT[t].a*100);
  h+=`<div class="stat"><span style="min-width:150px">${TOPICS[t]||t}</span><span class="bar"><i class="${p<60?'low':(p<80?'mid':'hi')}" style="width:${p}%"></i></span><span class="pct">${p}%</span></div>`});
 h+=`<p class="note">Rosso &lt; 60% · Giallo 60–79% · Verde ≥ 80%. Obiettivo prima dell'esame: nessuna materia sotto il 60% e media mock ≥ 24/30.</p></div>`;
 h+=`<div class="card"><span class="eyebrow">Simulazioni</span>${S.mocks.length?S.mocks.map((m,i)=>`<div class="stat"><span>Mock ${i+1} · ${m.date}</span><b class="${m.score>=21?'pass':'fail'}">${m.score.toFixed(2).replace('.',',')}/30</b></div>`).join(''):'<div class="empty">Nessuna simulazione svolta.</div>'}</div>`;
 h+=`<div class="card"><span class="eyebrow">Backup dei progressi</span><p class="note" style="margin-top:6px">I dati sono salvati in questo browser (localStorage): sopravvivono alla chiusura, ma vengono persi in incognito, cancellando i dati di navigazione o cambiando dispositivo. Esporta un backup a fine giornata e reimportalo quando serve.</p><div class="btnrow"><button class="btn sm" onclick="exportData()">Esporta progressi (.json)</button><button class="btn sec sm" onclick="document.getElementById('impFile').click()">Importa backup</button><input type="file" id="impFile" accept=".json,application/json" style="display:none" onchange="importData(this.files[0])"></div></div>`;
 h+=`<div class="btnrow"><button class="btn warn sm" onclick="if(confirm('Azzerare tutti i progressi (piano, errori, flashcard, mock)?')){localStorage.removeItem(KEY);location.reload()}">Azzera tutti i dati</button></div>`;
 return h}
function exportData(){const blob=new Blob([JSON.stringify(S)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='ripam-progressi-'+new Date().toISOString().slice(0,10)+'.json';a.click();URL.revokeObjectURL(a.href)}
function importData(f){if(!f)return;const r=new FileReader();r.onload=()=>{try{const d=JSON.parse(r.result);if(!d||typeof d!=='object'||!('tasks'in d))throw 0;S=d;S.tasks=S.tasks||{};S.hist=S.hist||{};S.errors=S.errors||{};S.srs=S.srs||{};S.mocks=S.mocks||[];save();paintTabs();paintHeader();render();alert('Backup importato: progressi ripristinati.')}catch(e){alert('File non valido: seleziona un backup esportato da questa app.')}};r.readAsText(f)}

paintTabs();paintHeader();render();
</script>
</body>
